name: Deploy Tankear

on:
  push:
    branches: [master]

jobs:
  # ─── Build frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: front-end
        run: npm install

      - name: Build
        working-directory: front-end
        env:
          VITE_API_BASE: 'https://tankear.com.ar/api'
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front-end/dist/
          retention-days: 1

  # ─── Deploy al servidor ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # necesario para que HEAD~1 exista en git diff

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: front-end/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            front-end/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/tankear/frontend/
          echo "✅ Frontend deployed"

      - name: Deploy backend
        run: |
          # Siempre copiar todos los archivos Python del backend
          BACKEND_FILES="main_do.py db_sqlite.py geo.py scraper_do.py precio_ciencia.py telegram_bot.py"

          echo "📦 Copiando archivos de backend al servidor..."
          for file in $BACKEND_FILES; do
            if [ -f "$file" ]; then
              scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                "$file" \
                ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/tankear/api/
              echo "  ✓ $file"
            fi
          done

          # main_do.py va también como main.py (el que usa el servicio systemd)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cp /var/www/tankear/api/main_do.py /var/www/tankear/api/main.py && \
             systemctl restart tankear && sleep 2 && systemctl is-active tankear"
          echo "✅ Backend desplegado y reiniciado"

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tankear.com.ar/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ tankear.com.ar responde 200 OK"
          else
            echo "❌ tankear.com.ar devolvió HTTP $STATUS"
            exit 1
          fi
